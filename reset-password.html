<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nouveau mot de passe - DataWork Track</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="reset-page">
      <div class="reset-card">
        <div class="reset-badge">DataWork Agency</div>

        <h1 class="reset-title">Nouveau mot de passe</h1>

        <p class="reset-subtitle">
          Entrez votre nouveau mot de passe pour récupérer votre compte.
        </p>

        <form id="resetPasswordForm" class="reset-form">
          <div class="form-group">
            <label for="newPassword">Nouveau mot de passe</label>
            <input
              type="password"
              id="newPassword"
              placeholder="Nouveau mot de passe"
              required
            />
          </div>

          <button type="submit" class="reset-btn">
            Mettre à jour le mot de passe
          </button>
        </form>

        <p id="resetMessage" class="reset-message"></p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="reset-password.js"></script>
  </body>
</html>
